name: Actualizar Fixture Quinela

on:
  schedule:
    - cron: "0 */3 * * *"  # Se corrigió a 5 campos (Cada 3 horas)
  workflow_dispatch:      # Esto activa el botón para ejecutarlo manual

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Crear carpeta .streamlit
        run: mkdir -p .streamlit

      - name: Inyectar Secrets
        run: |
          echo "${{ secrets.STREAMLIT_SECRETS_TOML }}" > .streamlit/secrets.toml

      - name: Ejecutar Sincronización
        run: python scripts/sincronizar_fixture_api.py
